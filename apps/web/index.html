<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salve · opendesk dev shell</title>
    <script>
      // Anti-FOUC: paint the right theme synchronously before any stylesheet
      // or bundle parses. Mirrors STORAGE_KEY + VALID_MODES from
      // apps/web/src/lib/theme.ts — keep them in sync.
      (() => {
        let stored = null;
        let mode = 'system';
        let resolved = 'light';
        try {
          stored = localStorage.getItem('salve.theme');
        } catch (_e) {
          // localStorage may be denied (e.g. Safari private mode).
        }
        mode = stored === 'light' || stored === 'dark' ? stored : 'system';
        try {
          resolved =
            mode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode;
        } catch (_e) {
          resolved = mode === 'dark' ? 'dark' : 'light';
        }
        if (resolved === 'dark') document.documentElement.classList.add('dark');
        document.documentElement.style.colorScheme = resolved;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Initial splash painted before any JS executes. Hidden by
      `#root:not(:empty) + #initial-splash` (see styles.css) the moment
      React paints into #root, so the React `<BrandSplash>` takes over
      seamlessly. Inlines a copy of the leaf glyph + animations so we
      never depend on the stylesheet/bundle for the very first paint —
      this is what eliminates the "logged-in flash" on a hard reload.
      Keep markup + animation timings in sync with `BrandSplash` and the
      `.brand-splash-*` rules in styles.css.
    -->
    <style>
      #initial-splash {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        background: oklch(0.98 0.005 230);
        transition: opacity 220ms ease-out;
      }
      /* Hide the moment React paints any content into #root. `~` not `+`
         so the intervening <style> block doesn't break the selector. */
      #root:not(:empty) ~ #initial-splash {
        opacity: 0;
        pointer-events: none;
      }
      .dark #initial-splash {
        background: oklch(0.16 0.018 230);
      }
      #initial-splash .stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      #initial-splash svg {
        color: oklch(0.58 0.115 200);
        animation: initial-splash-breathe 2.4s ease-in-out infinite;
      }
      .dark #initial-splash svg {
        color: oklch(0.62 0.11 200);
      }
      #initial-splash .dots {
        display: inline-flex;
        gap: 6px;
      }
      #initial-splash .dots > span {
        width: 6px;
        height: 6px;
        border-radius: 9999px;
        background: oklch(0.58 0.115 200);
        animation: initial-splash-dot 1.4s ease-in-out infinite;
      }
      .dark #initial-splash .dots > span {
        background: oklch(0.62 0.11 200);
      }
      #initial-splash .dots > span:nth-child(2) {
        animation-delay: 0.18s;
      }
      #initial-splash .dots > span:nth-child(3) {
        animation-delay: 0.36s;
      }
      @keyframes initial-splash-breathe {
        0%,
        100% {
          opacity: 0.55;
          transform: scale(0.96);
        }
        50% {
          opacity: 1;
          transform: scale(1.04);
        }
      }
      @keyframes initial-splash-dot {
        0%,
        80%,
        100% {
          opacity: 0.18;
          transform: translateY(0);
        }
        40% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #initial-splash svg,
        #initial-splash .dots > span {
          animation-duration: 0.001ms;
          animation-iteration-count: 1;
        }
      }
    </style>
    <div id="initial-splash" aria-hidden="true">
      <div class="stack">
        <svg width="56" height="56" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 4c0 8-5 14-13 14h-3c0-8 5-14 13-14h3z" fill="currentColor" opacity="0.18" />
          <path d="M20 4c0 8-5 14-13 14h-3c0-8 5-14 13-14h3z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M4 18c4-2 8-6 11-12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        </svg>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

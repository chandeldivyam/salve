name: Deploy prod

# Triggered on push to main. Two-job pipeline:
#   1. diff  — read-only sst diff. Always runs. Writes plan to summary.
#   2. apply — gated on the `production` GitHub Environment (manual approval).
#              Runs migrations if migration files changed, then sst deploy,
#              then inngest sync.
#
# Never echo secrets. The deploy role's permissions are wide pre-launch; flip
# to scoped policies before public launch (see plan §12).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  diff:
    name: sst diff prod
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      run_migrations: ${{ steps.detect_migrations.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: sst diff
        run: pnpm sst diff --stage prod

      - name: Detect migration changes
        id: detect_migrations
        run: |
          if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null \
            | grep -q '^packages/db/src/migrations/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Migration files changed since last commit."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No migration files changed."
          fi

  apply:
    name: sst deploy prod
    needs: diff
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # `production` is a GitHub Environment with required-reviewers protection
    # configured via the GH API. The role's trust policy allows assumption from
    # this repo, but the workflow can't even start until a reviewer approves.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run database migrations
        if: needs.diff.outputs.run_migrations == 'true'
        run: STAGE=prod bash scripts/run-migrate.sh
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: sst deploy
        run: pnpm sst deploy --stage prod

      - name: Inngest Cloud sync
        run: STAGE=prod bash scripts/inngest-sync.sh
        env:
          INNGEST_API_KEY: ${{ secrets.INNGEST_API_KEY }}
        # Inngest sync is best-effort — lazy registration on first event also
        # works. Don't fail the whole deploy if sync hiccups (see plan §12).
        continue-on-error: true

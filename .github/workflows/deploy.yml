name: Deploy prod

# Triggered on push to main. Two-job pipeline:
#   1. diff  — read-only sst diff. Always runs. Writes plan to summary.
#   2. apply — gated on the `production` GitHub Environment (manual approval).
#              Runs migrations if migration files changed, then sst deploy,
#              then inngest sync.
#
# Never echo secrets. The deploy role's permissions are wide pre-launch; flip
# to scoped policies before public launch (see plan §12).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  diff:
    name: sst diff prod
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: sst diff
        run: pnpm sst diff --stage prod

  apply:
    name: sst deploy prod
    needs: diff
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # `production` is a GitHub Environment with required-reviewers protection
    # configured via the GH API. The role's trust policy allows assumption from
    # this repo, but the workflow can't even start until a reviewer approves.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: sst deploy
        run: pnpm sst deploy --stage prod

      # Always run migrations — never gated on file diffs. Reasons:
      # 1. Fresh deploys (e.g. after `sst remove`) need migrations even
      #    though no migration files changed since the last commit.
      # 2. Drizzle is idempotent: already-applied migrations are tracked
      #    in `drizzle.__drizzle_migrations` and skipped on re-run.
      # 3. The cost of always running is ~5s when no-op vs. the cost of
      #    a missed migration is total app outage.
      #
      # Order: AFTER `sst deploy` so the migrate task definition (and
      # Aurora) exist. On a fresh deploy the API/Web/Zero services may
      # briefly fail-to-connect against the empty DB until migrate runs;
      # they self-heal once tables exist (no manual restart needed).
      - name: Run database migrations
        run: STAGE=prod bash scripts/run-migrate.sh
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Inngest Cloud sync
        run: STAGE=prod bash scripts/inngest-sync.sh
        env:
          INNGEST_API_KEY: ${{ secrets.INNGEST_API_KEY }}
        # Inngest sync is best-effort — lazy registration on first event also
        # works. Don't fail the whole deploy if sync hiccups (see plan §12).
        continue-on-error: true
